<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創作分析 · KOL Video Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface-2: #18181f;
    --border: #2a2a35;
    --border-active: #5b5bd6;
    --text-primary: #f0f0f5;
    --text-secondary: #8888a8;
    --text-muted: #55556a;
    --accent: #5b5bd6;
    --accent-soft: rgba(91,91,214,0.12);
    --accent-glow: rgba(91,91,214,0.25);
    --green: #2dd4a0;
    --green-soft: rgba(45,212,160,0.1);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,0.1);
    --red: #f06060;
    --red-soft: rgba(240,96,96,0.1);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .header-tag {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .panel-left {
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .panel-left::-webkit-scrollbar { width: 4px; }
  .panel-left::-webkit-scrollbar-track { background: transparent; }
  .panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Right Panel ── */
  .panel-right {
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }
  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Section Labels ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* ── Tag Groups ── */
  .tag-group { display: flex; flex-direction: column; gap: 8px; }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    background: var(--surface-2);
  }
  .tag:hover { border-color: var(--accent); color: var(--text-primary); }
  .tag.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Platform Icons ── */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .platform-btn {
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    text-align: center;
  }
  .platform-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .platform-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .platform-btn svg { width: 18px; height: 18px; }

  /* ── Input ── */
  .input-group { display: flex; flex-direction: column; gap: 8px; }

  .url-input-wrap {
    position: relative;
  }

  .url-input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'Inter', monospace;
    transition: border-color 0.15s;
    outline: none;
    resize: none;
    min-height: 80px;
  }
  .url-input::placeholder { color: var(--text-muted); }
  .url-input:focus { border-color: var(--accent); }

  .url-hint {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ── Material Type ── */
  .material-row {
    display: flex;
    gap: 8px;
  }

  .material-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .material-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .material-btn.active-green {
    background: var(--green-soft);
    border-color: var(--green);
    color: var(--green);
  }
  .material-btn.active-amber {
    background: var(--amber-soft);
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Analyze Button ── */
  .analyze-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.2px;
  }
  .analyze-btn:hover { background: #4a4ac4; box-shadow: 0 0 20px var(--accent-glow); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .analyze-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .analyze-btn.loading .spinner { display: block; }
  .analyze-btn.loading .btn-text { opacity: 0.7; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── API Key ── */
  .api-key-section {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .api-key-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .api-key-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .api-key-input::placeholder { color: var(--text-muted); }

  .api-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .api-status.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Right: Empty State ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
  }

  .empty-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 280px;
    line-height: 1.7;
  }

  /* ── Results ── */
  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }

  .results-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .results-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .results-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .result-tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }
  .result-tag.region { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .result-tag.platform { border-color: var(--border); color: var(--text-secondary); background: var(--surface-2); }
  .result-tag.material-high { border-color: var(--green); color: var(--green); background: var(--green-soft); }
  .result-tag.material-convert { border-color: var(--amber); color: var(--amber); background: var(--amber-soft); }

  .copy-all-btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Layer Cards ── */
  .layers { display: flex; flex-direction: column; gap: 16px; }

  .layer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .layer-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .layer-header:hover { background: var(--surface-2); }

  .layer-number {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .layer-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .layer-chevron {
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .layer-card.open .layer-chevron { transform: rotate(180deg); }

  .layer-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }
  .layer-card.open .layer-body { display: block; }

  /* ── Layer Content Styling ── */
  .layer-content {
    padding-top: 14px;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.8;
  }

  .layer-content h4 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 14px 0 6px;
  }
  .layer-content h4:first-child { margin-top: 0; }

  .layer-content p { margin-bottom: 8px; }

  .layer-content ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .layer-content li {
    padding-left: 14px;
    position: relative;
    color: var(--text-secondary);
  }
  .layer-content li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--text-muted);
  }

  .highlight-box {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 13px;
    color: var(--text-primary);
  }

  .green-box {
    background: var(--green-soft);
    border: 1px solid var(--green);
    border-left: 3px solid var(--green);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 13px;
    color: var(--text-primary);
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 6px 0;
  }
  .score-label { font-size: 12px; color: var(--text-secondary); min-width: 80px; }
  .score-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }
  .score-fill.green { background: var(--green); }
  .score-fill.amber { background: var(--amber); }
  .score-val { font-size: 12px; font-weight: 600; color: var(--text-primary); min-width: 32px; text-align: right; }

  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .cloud-tag {
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .cloud-tag.hot {
    background: rgba(240,96,96,0.1);
    border-color: var(--red);
    color: var(--red);
  }

  /* ── Loading skeleton ── */
  .skeleton-results { display: flex; flex-direction: column; gap: 16px; }

  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .skel {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 12px;
  }
  .skel.h16 { height: 16px; }
  .skel.h24 { height: 24px; }
  .skel.w60 { width: 60%; }
  .skel.w40 { width: 40%; }
  .skel.w80 { width: 80%; }
  .skel.w100 { width: 100%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .loading-status {
    text-align: center;
    padding: 16px;
    color: var(--text-secondary);
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Error ── */
  .error-box {
    background: var(--red-soft);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  /* ── History ── */
  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .history-item:hover { border-color: var(--accent); }

  .history-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .history-url {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-time {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; height: auto; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .panel-right { min-height: 60vh; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      創作分析
    </div>
    <div class="header-tag">3D AI · KOL Video Analyzer · MVP v0.1 · KB v1.0</div>
  </header>

  <main>
    <!-- ── Left Panel ── -->
    <div class="panel-left">

      <!-- API Key -->
      <div>
        <div class="section-label">Anthropic API Key</div>
        <div class="api-key-section">
          <div class="api-key-row">
            <div class="api-status" id="apiStatus"></div>
            <input class="api-key-input" type="password" id="apiKeyInput"
              placeholder="sk-ant-..." autocomplete="off" />
          </div>
        </div>
        <div class="url-hint" style="margin-top:6px;">Key 僅存於本地，不會上傳。</div>
      </div>

      <div class="divider"></div>

      <!-- Region -->
      <div class="tag-group">
        <div class="section-label">語區</div>
        <div class="tag-row" id="regionTags">
          <div class="tag active" data-val="EN">EN</div>
          <div class="tag" data-val="JP">JP</div>
          <div class="tag" data-val="KR">KR</div>
          <div class="tag" data-val="FR">FR</div>
          <div class="tag" data-val="ES">ES</div>
        </div>
      </div>

      <!-- Platform -->
      <div class="tag-group">
        <div class="section-label">平台</div>
        <div class="platform-grid" id="platformBtns">
          <div class="platform-btn active" data-val="YouTube Long">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
            YT Long
          </div>
          <div class="platform-btn" data-val="YouTube Shorts">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
            YT Shorts

# 模塊三｜爆款內容結構庫

篩選口徑：YT Long最新Views > 2萬；短視頻 > 10萬
數據來源：817條，目標語區EN/JP/KR/FR/ES共579條（截至2026.05）

## 分析方法：先判斷情緒軸，再對應公式
核心原則：不要從題材反推公式，要從情緒機制正推。
分析一條視頻時，先問：「這條視頻在製造什麼情緒？」再對應公式。
廣告合作創作者 vs 有機創作者：分析時需區分。廣告視頻的公式不一定等於品牌內容的可複製公式。

## 六大爆款公式

### F1｜圖片→實物 反差鉤子
適用：EN/JP/KR/ES短視頻 ｜ 標竿：りくらぼ 5.3M、Laye 3D print 15M、Nick 3DLab 9.05M
情緒機制：「看得見摸得著」的落地感；把想像變成現實的魔法感；「我也可以做」的低門檻共鳴
敘事結構：①展示輸入圖（一張照片/塗鴉/截圖）→②AI生成3D模型（快剪，強調速度）→③切片/打印過程快剪→④完成實物大特寫（最強情緒高點）→⑤CTA
最強Hook："Turn a monster drawn by your kid into a real toy" / "Gift them a custom figure of themselves" / 「遂に子供のイラストがフィギュアに👦🏻✨」（JP 2.08M）
最佳題材：孩子塗鴉、寵物照片、個人化禮物、可愛角色、生活小物

### F-JP1｜荒唐前提 × バカ真剣（JP專屬公式）
適用：JP短視頻主力 ｜ 標竿：りくらぼ（穩定多條百萬）
情緒機制：日本「認真搞笑」文化結構——荒唐前提→バカ真剣執行→反差笑點+微情感
敘事結構：①荒唐な前提を提示（タイトル自体が笑えるか「なぜ？」な問い）→②動機説明（微情感が入る）→③AI生成＋3Dプリント過程を「実験ドキュメント」として見せる→④結果発表——成功でも失敗でも笑いが取れる構造→⑤オチに微情感
有效前提：「〇〇は3Dプリントで作れるのか？」系の検証型；普通は買うもの/作るものをわざわざ3Dプリントする理由がある；ペット/家族/自分自身を巻き込む；失敗しても笑える設計
核心洞察：タイトルの「前提の問い」さえ設計できれば残り70%は決まる。AIと3Dプリンターはその前提を実現する手段であって主役ではない。

### F2｜VFX/現實合成 視覺衝擊
適用：EN短視頻王炸 ｜ 標竿：omerterzivfx 37.83M、Next Level Studio 28.88M、tgh_learnings 21.65M
⚠️ 門檻說明：代表創作者（Marcos Medel等）均有VFX/3D動畫專業背景。Meshy在流程中是「資產製作提速工具」，不是零門檻即可複製的公式。Brief時須說明此公式適合有VFX基礎的創作者。
情緒機制：「讓觀眾懷疑自己的眼睛」的認知失調；不是「我也可以」，而是「這不可能是真的」

## 視頻結構模板

短視頻黃金結構（15-45秒）：
- 0s：最終成果先出現（打印品/VFX/模型）——絕對不從界面開始
- 3s：展示輸入（一張圖/一句話）
- 8s：快剪生成過程（強調速度）
- 20s：關鍵驗証（導入/切片截圖/打印）
- 35s：CTA
核心原則：先給結果，再解釋流程，最後補限制——所有語區的高爆款都遵循這個順序。

YT Long黃金結構（8-15分鐘）：
- 0:00 開場提問/挑戰
- 1:00 工具介紹 + Mention Meshy（Brief要求早段出現）
- 3:00 實際生成過程（含失敗案例）
- 7:00 Blender/Unity/切片驗証（關鍵信任時刻）
- 11:00 成本/時間對比數字
- 13:00 誠實結論 + CTA

## Brief通用要求
必須有：早段mention Meshy；完整workflow展示；最終成果清晰可見；真實操作畫面（非純渲染）
建議有：失敗/修正過程；時間/成本對比數字；導入第三方軟件截圖；評論引導互動
禁止：只做純功能介紹；只展示渲染圖；宣稱「完全替代建模師」；JP市場用受保護IP角色作示範

## 通用爆款規律
- R1 成果優先：所有高爆款都把最終結果放在視頻0-3秒。沒有一條爆款從界面/注冊/功能介紹開始。
- R2 輸入越簡單越爆：「一張照片」「一句話」「一張塗鴉」的輸入門檻越低，越容易引發「我也可以」的共鳴。
- R3 語區情緒溫度不同：JP頂流靠「溫暖成就感」或「荒唐本気笑い」，KR靠「AI潮流感」，EN靠「視覺不可思議感」。同一個公式在不同語區需要不同情緒溫度。
- R4 長視頻需要「可信度成本」：包含真實失敗案例、驗証截圖、工具比較。JP最吃徹底比較型，EN最吃Game Dev工作流型。
- R5 3D打印是最強實物化鉤子：以真實打印成品作結尾的視頻，平均表現高於只展示屏幕的視頻。Meshy × MakerWorld整合後這個效應更強。
- R6 平台分佈：IG Reels是EN/KR/ES短視頻主戰場；YT Shorts是JP主戰場；TikTok在ES/KR有強補充；X在EN技術圈有效。
- R7 高表現創作者→長期合作：首次合作是質量篩選，確認質量後放量才是正確策略。

# 模塊四｜行業背景框架

## 賽道演進時間軸
- 2024 新奇驗証期：「這很酷，但能用嗎？」→ 驅動詞：in seconds / no skills needed / free trial
- 2025上 工具試用期：「可以當草模，但不能進生產」→ 驅動詞：game-ready? / export to Blender?
- 2025下 場景分化期：3D打印用戶 vs 遊戲用戶標準分裂 → 驅動詞：print-ready STL/3MF / AI game asset pipeline
- 2026 生產鏈路期：「AI可以幫我起步，但我只相信真實結果」→ 驅動詞：multi-color 3MF / real print result / from image to 3MF
當前核心判斷：受眾不再被「AI生成了一個模型」打動，需要看到「這個模型真實進入了你的工作流」。

## 行業關鍵趨勢（2026）
①工作流閉環競爭：從「能生成」→「生成→編輯→優化→導出→打印/引擎/動畫」完整閉環。Meshy 3D Agent方向、Tripo批量導出、Bambu/Formlabs直接對接。
②拓撲質量成行業新門檻：Quad Mesh成新標準（Hunyuan PolyGen 1.5、Rodin Gen-2、Tripo Smart Mesh）。Reddit：「直接丟進遊戲會爛掉，還是要手動retopo。」
③3D打印賽道成形（最重要的外部增量）：Meshy × Bambu Lab MakerWorld深度整合（2026.03.17）——照片→2分鐘內瀏覽器生成print-ready 3D模型，自動映射多色.3MF，直接進Bambu Studio打印。Bambu 2025年月活突破1000萬。「從圖片到實物」成獨立爆款品類。
④Text-to-Motion爆發：Hunyuan HY-Motion 1.0開源（10億參數，200+動作類別）；Tripo 100+動畫自動綁定；靜態模型→可動角色賽道融合。
⑤免費層競爭白熱化：Hunyuan每日20個免費；Tripo Turbo超快免費；衝擊付費轉化。競對監控：Meshy用戶流失至Tripo和3daistudio。
⑥IP/版權爭議升溫：MakerWorld Labubu訴訟（2026）；Disney/Universal起訴Midjourney（2025.06）；日本讀賣/朝日/日經相繼起訴Perplexity AI（2025.08起）。平台和KOL都需要明確合規邊界。

## 高頻Objection與反制策略
- 「Topology太差，沒法進管線」→ 展示Quad Mesh/wireframe導入Blender/Unity實況，不只看渲染圖
- 「商業授權不清楚，怕被告」→ 直接說明付費方案商業授權範圍；JP市場需額外說明AI生成物著作権問題
- 「風格太generic，沒有特色」→ 展示style reference圖的控制效果；同系列資產一致性案例
- 「還是要手動修很多，沒省多少時間」→ 誠實說明「AI生成60-80% + 人工收尾」；用三七互娱數據：複雜項目提效30-40%，小遊戲提效50%
- 「訂閱費不值得，免費夠用了」→ 計算批量生成的時間成本vs訂閱費；強調資產私有和商業授權的付費價值
- 「AI會取代3D藝術家嗎？」→ 教育研究數據（西班牙動畫學院49人）：55%主動採用，共識是「有用的工具，不是替代」
- 「AI模型是AI slop，社區不認可」→ 展示真實打印照片+原創說明；避免只用渲染圖當封面

## IP/版權合規邊界（分析工具特別標注規則）
分析成片內容時，若出現以下情況需在分析結果中標注：
- 高版權風險：涉及Disney、Sanrio、任天堂、Labubu、Marvel、DC等受保護IP的3D生成或打印內容
- JP市場特別提示：JP語區的內容若涉及知名IP AI創作，額外說明「JP創作者社群有強烈的原作者尊重文化，即使技術上合法，道德爭議仍存在」
- 授權誤區：「平台商業授權」≠「輸入圖的版權也被覆蓋」，這是最常見的用戶認知錯誤
用戶最在乎但市場沒有說清楚的問題：「我用AI生成的3D模型，商業上到底能不能用？」「如果我輸入了參考圖，生成的模型算侵權嗎？」——這類問題在評論區反覆出現，分析工具應將其識別為高轉化信號。

function setupSingleSelect(containerId, stateKey) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('[data-val]').forEach(el => {
    el.addEventListener('click', () => {
      container.querySelectorAll('[data-val]').forEach(e => {
        e.classList.remove('active', 'active-green', 'active-amber');
      });
      if (stateKey === 'material') {
        el.classList.add(el.dataset.val === '高曝光' ? 'active-green' : 'active-amber');
      } else {
        el.classList.add('active');
      }
      state[stateKey] = el.dataset.val;
    });
  });
}

function renderResults(data, url, meta) {
  const area = document.getElementById('resultsArea');
  const materialClass = meta.material === '高曝光' ? 'material-high' : 'material-convert';

  area.innerHTML = `
    <div class="results-header">
      <div class="results-meta">
        <div class="results-title">${data.videoTitle || '成片分析報告'}</div>
        <div class="results-tags">
          <span class="result-tag region">${meta.region}</span>
          <span class="result-tag platform">${getPlatformShort(meta.platform)}</span>
          <span class="result-tag ${materialClass}">${meta.material}</span>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${url}</div>
      </div>
      <button class="copy-all-btn" onclick="copyAll()">複製全部</button>
    </div>

    <div class="layers" id="layersContainer">
      ${renderLayer1(data.layer1)}
      ${renderLayer2(data.layer2)}
      ${renderLayer3(data.layer3)}
      ${renderLayer4(data.layer4)}
      ${renderLayer5(data.layer5)}
      ${renderLayer6(data.layer6)}
    </div>
  `;

  // Auto-open first layer
  const firstCard = area.querySelector('.layer-card');
  if (firstCard) firstCard.classList.add('open');

  // Layer toggle
  area.querySelectorAll('.layer-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('open');
    });
  });
}

        <div class="layer-content">${content}</div>

}

}

function renderLayer2(d) {

function renderLayer6(d) {

  const area = document.getElementById('resultsArea');
  area.innerHTML = `
    <div class="loading-status">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <span style="margin-left:8px;">AI 正在分析中，通常需要 15–30 秒...</span>
    </div>
    <div class="skeleton-results">
      ${[1,2,3].map(i => `
        <div class="skeleton-card">
          <div class="skel h16 w60"></div>
          <div class="skel w100"></div>
          <div class="skel w80"></div>
          <div class="skel w40"></div>
        </div>
      `).join('')}

// ── Main Analysis ──
async function runAnalysis() {
  const url = document.getElementById('urlInput').value.trim();
  const apiKey = document.getElementById('apiKeyInput').value.trim();

  if (!url) {
    alert('請貼入影片連結。'); return;
  }
  if (!apiKey) {
    alert('請輸入 Anthropic API Key。'); return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'block';
  showLoading();

  const meta = { region: state.region, platform: state.platform, material: state.material };
  const prompt = buildPrompt(url);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        system: '你是3D AI市場KOL內容分析專家，知識庫版本v1.0（2026.06）。分析時請充分引用知識庫中的具體爆款公式（F1–F6、F-JP1）、語區痛點/爽點數據、通用規律（R1–R7）和行業趨勢，讓分析結論有具體依據而非泛泛而談。請嚴格按JSON格式輸出，不要包含任何markdown標記或額外說明文字。',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API Error ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.content?.[0]?.text || '';

    let parsed;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('AI回傳格式異常，請重試。\n\n原始內容：' + rawText.slice(0, 200));
    }

    renderResults(parsed, url, meta);

    // Save history
    addHistory(url, meta);

  } catch (err) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="error-box">
        <strong>分析失敗</strong><br>${err.message}
      </div>
      <div class="empty-state" style="height:auto;padding:40px 0;">
        <p>請檢查 API Key 是否正確，或稍後重試。</p>
      </div>
    `;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── History ──
function addHistory(url, meta) {
  const item = { url, meta, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }) };
  state.history.unshift(item);
  if (state.history.length > 5) state.history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (state.history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = state.history.map((item, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-dot"></div>
      <div class="history-url">${item.url}</div>
      <div class="history-time">${item.time}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const item = state.history[i];
  document.getElementById('urlInput').value = item.url;
}

// ── Copy All ──
function copyAll() {
  const area = document.getElementById('resultsArea');
  const text = area.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = area.querySelector('.copy-all-btn');
    btn.textContent = '已複製 ✓';
    setTimeout(() => { btn.textContent = '複製全部'; }, 2000);
  });
}

// ── Enter key support ──
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runAnalysis();
});
</script>
